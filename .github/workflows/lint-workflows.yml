name: Lint Workflows

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/*.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/*.yml"

jobs:
  lint:
    name: Zizmor Workflow Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2

      - name: Run zizmor
        uses: woodruffw/zizmor-action@d927e66b39ab8c0c2ca3ef85f8c00aa86e6e2c94  # v2.0.0
        with:
          paths: ".github/workflows"
          format: "sarif"
          output: "zizmor-report.sarif"
        continue-on-error: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@7f6f3d32d43d7aace007b1a3d6a8e1d92d456fcc  # v3.26.7
        if: always() && hashFiles('zizmor-report.sarif') != ''
        with:
          sarif_file: zizmor-report.sarif
          category: "zizmor"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            if (require('fs').existsSync('zizmor-report.sarif')) {
              const report = JSON.parse(require('fs').readFileSync('zizmor-report.sarif', 'utf8'));
              const results = report.runs[0]?.results || [];
              if (results.length > 0) {
                let comment = '## Workflow Security Issues (zizmor)\n\n';
                for (const result of results) {
                  const rule = result.ruleId;
                  const message = result.message.text;
                  const location = result.locations?.[0];
                  comment += `- **${rule}**: ${message}\n`;
                }
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            }
