name: Lint Workflows

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/*.yml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/*.yml"

jobs:
  lint:
    name: Zizmor Workflow Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # zizmor-action uploads SARIF to the Security tab
      pull-requests: write  # required for the Comment on PR step

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2

      - name: Run zizmor
        id: zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa  # v0.5.7
        with:
          inputs: ".github/workflows"
        # advanced-security defaults to true: the action uploads the SARIF to
        # the Security tab itself (category "zizmor"). A separate upload-sarif
        # step would be a duplicate upload and collide on tool/category.
        continue-on-error: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          SARIF_FILE: ${{ steps.zizmor.outputs.output-file }}
        with:
          script: |
            const sarifFile = process.env.SARIF_FILE;
            if (sarifFile && require('fs').existsSync(sarifFile)) {
              const report = JSON.parse(require('fs').readFileSync(sarifFile, 'utf8'));
              const results = report.runs[0]?.results || [];
              if (results.length > 0) {
                let comment = '## Workflow Security Issues (zizmor)\n\n';
                for (const result of results) {
                  const rule = result.ruleId;
                  const message = result.message.text;
                  const location = result.locations?.[0];
                  comment += `- **${rule}**: ${message}\n`;
                }
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            }
