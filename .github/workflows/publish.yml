name: Publish to PyPI

# Triggered when a semver tag (v*) is pushed.
# Uses OIDC Trusted Publishing — no long-lived API token required.
# Actions are pinned to commit SHAs for supply-chain security.
#
# Prerequisites (one-time manual steps — do NOT merge without completing):
#   1. Create a "pypi" environment in GitHub repo Settings → Environments
#   2. Add a Trusted Publisher on pypi.org/manage/account/publishing/:
#      - Owner:    LegionForge
#      - Repo:     LegionForge-Guardian
#      - Workflow: publish.yml
#      - Environment: pypi
#
# To cut a release:
#   git tag v0.2.0 -m "Release v0.2.0"
#   git push origin v0.2.0

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Harden Runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d080e0dcf722d51ea50  # v2.10.1
        with:
          egress-policy: audit
          allowed-endpoints: |
            github.com:443
            api.github.com:443
            pypi.python.org:443

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build distribution
        run: python -m build

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d080e0dcf722d51ea50  # v2.10.1
        with:
          egress-policy: audit
          allowed-endpoints: |
            github.com:443
            api.github.com:443
            upload.pypi.org:443
            pypi.org:443

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          attestations: true
