name: Publish to PyPI

# Triggered when a semver tag (v*) is pushed.
# Uses OIDC Trusted Publishing — no long-lived API token required.
# Actions are pinned to commit SHAs for supply-chain security.
#
# Prerequisites (one-time manual steps — do NOT merge without completing):
#   1. Create a "pypi" environment in GitHub repo Settings → Environments
#   2. Add a Trusted Publisher on pypi.org/manage/account/publishing/:
#      - Owner:    LegionForge
#      - Repo:     LegionForge-Guardian
#      - Workflow: publish.yml
#      - Environment: pypi
#
# To cut a release:
#   git tag v0.2.0 -m "Release v0.2.0"
#   git push origin v0.2.0

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
          allowed-endpoints: |
            github.com:443
            api.github.com:443
            pypi.python.org:443

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build distribution
        run: python -m build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
          allowed-endpoints: |
            github.com:443
            api.github.com:443
            upload.pypi.org:443
            pypi.org:443

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          attestations: true
