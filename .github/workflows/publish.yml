name: Publish to PyPI

# Triggered when a semver tag (v*) is pushed.
# Uses OIDC Trusted Publishing — no long-lived API token required.
# Actions are pinned to commit SHAs for supply-chain security.
#
# Prerequisites (one-time manual steps — do NOT merge without completing):
#   1. Create a "pypi" environment in GitHub repo Settings → Environments
#   2. Add a Trusted Publisher on pypi.org/manage/account/publishing/:
#      - Owner:    LegionForge
#      - Repo:     LegionForge-Guardian
#      - Workflow: publish.yml
#      - Environment: pypi
#
# To cut a release:
#   git tag v0.2.0 -m "Release v0.2.0"
#   git push origin v0.2.0

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build distribution
        run: python -m build

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2  # v2.2.3
        with:
          subject-path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@7f25271a4aa483500f742f9492b2ab5648d61011  # v1.12.4
        with:
          attestations: true
