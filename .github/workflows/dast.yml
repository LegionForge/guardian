name: DAST (Guardian)

# Dynamic Application Security Testing — OWASP ZAP baseline scan against running Guardian instance.
# Tests for:
#   - Missing HTTP security headers (X-Content-Type-Options, CSP, HSTS, etc.)
#   - Authentication enforcement on protected endpoints (/check, /rules)
#   - Response body information disclosure
#   - Session/token lifecycle issues
#   - Input fuzzing on /check POST endpoint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dast:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    env:
      GUARDIAN_DB_PASSWORD: test-password
      GUARDIAN_REQUIRE_AUTH: "false"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2

      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
          allowed-endpoints: |
            github.com:443
            api.github.com:443

      - name: Start Guardian (Docker Compose)
        run: |
          docker compose up -d
          echo "Waiting for Guardian to be ready..."

      - name: Wait for Guardian /health
        run: |
          timeout 60 bash -c '
            until curl -sf http://localhost:9766/health >/dev/null 2>&1; do
              echo "Waiting for Guardian..."
              sleep 2
            done
            echo "Guardian is ready!"
          '
        timeout-minutes: 2

      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker run --rm --network host --user 0 \
            -v $(pwd):/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t "http://localhost:9766/health" \
              -r zap-report.html
        continue-on-error: true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: always() && hashFiles('zap-report.html') != ''
        with:
          name: zap-report
          path: zap-report.html
          retention-days: 90

      - name: Cleanup
        if: always()
        run: docker compose down -v
