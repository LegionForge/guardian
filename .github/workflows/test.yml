name: Tests

# Runs the full guardian test suite on every push and PR.
# No external services required — all tests are deterministic and in-process.
# DB, Docker, and Guardian sidecar are NOT started.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test:
    name: "Test (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
          allowed-endpoints: |
            github.com:443
            api.github.com:443
            pypi.org:443
            files.pythonhosted.org:443

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short --cov=src/legionforge_guardian --cov-report=xml

      - name: Check formatting
        run: python -m black --check --target-version py311 src/ tests/

      - name: Upload coverage
        uses: codecov/codecov-action@7f8b4b4bde536c465e797be725718b88c5d95e0e  # v5.1.1
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
