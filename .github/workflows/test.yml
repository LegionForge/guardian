name: Tests

# Runs the full guardian test suite on every push and PR.
# No external services required — all tests are deterministic and in-process.
# DB, Docker, and Guardian sidecar are NOT started.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: "Test (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2

      - name: Harden Runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d080e0dcf722d51ea50  # v2.10.1
        with:
          egress-policy: audit
          allowed-endpoints: |
            github.com:443
            api.github.com:443
            pypi.org:443
            files.pythonhosted.org:443

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short --cov=src/legionforge_guardian --cov-report=xml

      - name: Check formatting
        run: python -m black --check --target-version py311 src/ tests/

      - name: Upload coverage
        uses: codecov/codecov-action@6d798873191c83af2a9f2f4f35bc92ffed5f49ad  # v5.1.1
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
