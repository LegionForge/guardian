version: 2

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    allow:
      - dependency-type: "direct"
    reviewers:
      - "jp-cruz"
    assignees:
      - "jp-cruz"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    allow:
      - dependency-type: "all"
    reviewers:
      - "jp-cruz"
    assignees:
      - "jp-cruz"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
